<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API</title>
</head>

<body>

    <img src="https://placehold.co/130" alt="">

    <script>
        const apiUrl = 'https://pokeapi.co/api/v2/pokemon/pikachu'

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) {
                    console.log('erreur');
                }
                return response.json();
            })
            .then(data => {
                console.log(data);

            })
            .catch(error => {
                console.log('error');
            });


        let apiContent = document.createElement('li')
        apiContent.textContent = apiUrl
        document.body.appendChild(apiContent)


    </script>











</body>

</html>
