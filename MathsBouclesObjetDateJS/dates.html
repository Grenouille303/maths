<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dates</title>
</head>
<body>

    <p>L'objet date se base sur les milisecondes et il a commencé a compter en 1970</p>
    <script>

        let date = Date.now()
        console.log(date);


        let newDate = new Date()
        console.log(newDate);

        console.log(newDate.getFullYear());
        console.log(newDate.getMonth());
        console.log(newDate.getDay());
        console.log(newDate.getMinutes());
        
        
        
        
        
        



    </script>



    
    
</body>
</html>
